global:
  resolve_timeout: 5m

route:
  receiver: "jobskill-webhook"
  group_by:
    - alertname
    - service
    - severity
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h

receivers:
  - name: "jobskill-webhook"
    webhook_configs:
      - url: "http://api:8000/alertmanager/webhook"
        send_resolved: true
