services:
  postgres:
    image: postgres:16
    container_name: jobskill-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - jobskill_pgdata:/var/lib/postgresql/data

volumes:
  jobskill_pgdata: